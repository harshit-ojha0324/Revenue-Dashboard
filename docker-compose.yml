version: '3'

services:
  # MongoDB service
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network
    environment:
      MONGO_INITDB_DATABASE: sales-dashboard

  # Backend Node.js service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: backend
    restart: always
    ports:
      - "5001:5001"
    depends_on:
      - mongodb
    networks:
      - app-network
    environment:
      - NODE_ENV=production
      - PORT=5001
      # Provide a MONGO_URI via environment or use the docker network mongodb service
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=30d
      - JWT_COOKIE_EXPIRE=30

  # Frontend React service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  mongodb_data:

networks:
  app-network:
    driver: bridge