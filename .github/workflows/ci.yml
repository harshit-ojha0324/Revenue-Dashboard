name: Sales Dashboard CI/CD
# Updated to trigger new workflow run with test fix

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [16.x]

    steps:
      - uses: actions/checkout@v3
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run linting
        run: npm run lint
        
      - name: Run tests
        run: npm test
        
      - name: Build
        run: npm run build

  # Example deploy job, would need to be configured for your specific hosting
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and push backend
        uses: docker/build-push-action@v4
        with:
          context: .
          target: backend
          push: true
          tags: yourusername/sales-dashboard-backend:latest
          
      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: .
          target: frontend
          push: true
          tags: yourusername/sales-dashboard-frontend:latest
          
      # Add your deployment steps here
      # Examples:
      # - Deploy to kubernetes cluster
      # - Deploy to cloud service like AWS, Google Cloud, etc.
      # - SSH into your server and pull the latest Docker images